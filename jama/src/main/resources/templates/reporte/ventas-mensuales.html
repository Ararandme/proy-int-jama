<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ventas Mensuales</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-dark text-light">

<nav class="navbar navbar-dark bg-black px-4">
    <a class="navbar-brand fw-bold" th:href="@{/reporte}">Reportes</a>

    <div>
        <a th:href="@{/menu/main-menu}" class="btn btn-outline-light btn-sm">← Menú principal</a>
        <a th:href="@{/reporte}" class="btn btn-outline-primary btn-sm">Reportes</a>
    </div>
</nav>

<div class="container py-4">

    <div class="card bg-secondary-subtle text-dark shadow">
        <div class="card-header bg-primary text-white">
            <h4 class="mb-0">Reporte de ventas mensual</h4>
        </div>

        <div class="card-body">

            <div class="mb-3">
                <a th:href="@{/reporte/ventas-mensuales/csv}" class="btn btn-success btn-sm">Exportar CSV</a>
                <a th:href="@{/reporte/ventas-mensuales/excel}" class="btn btn-warning btn-sm">Exportar Excel</a>
            </div>

            <table class="table table-bordered table-hover">
                <thead class="table-dark">
                <tr>
                    <th>Año</th>
                    <th>Mes</th>
                    <th>Cantidad de ventas</th>
                    <th>Total vendido</th>
                </tr>
                </thead>

                <tbody>
                <tr th:if="${#lists.isEmpty(ventasMensuales)}">
                    <td colspan="4" class="text-center text-muted">No hay ventas registradas</td>
                </tr>

                <tr th:each="v : ${ventasMensuales}">
                    <td th:text="${v[0]}"></td>
                    <td th:text="${v[1]}"></td>
                    <td th:text="${v[2]}"></td>
                    <td th:text="'S/ ' + ${#numbers.formatDecimal(v[3], 1, 2)}"></td>
                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
